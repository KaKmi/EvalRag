#f0f0f0;border-radius:6px;padding:9px 12px;margin-top:-8px\">\n              <span style=\"font-size:12px;line-height:18px;color:#1677ff;flex:none\">ⓘ<\u002Fspan>\n              <div style=\"font-size:12px;color:rgba(0,0,0,.5);line-height:1.6\">{{ pfNodeHint }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">Prompt 内容<\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(0,0,0,.4)\">用 <span style=\"font-family:ui-monospace,Menlo,monospace\">{变量名}<\u002Fspan> 插入动态内容<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px;align-items:center\">\n                <span style=\"font-size:12px;color:rgba(0,0,0,.45)\">推荐变量<\u002Fspan>\n                <sc-for list=\"{{ pfInsertVars }}\" as=\"v\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ v.onInsert }}\" style=\"font-size:12px;line-height:24px;height:24px;padding:0 9px;border-radius:6px;border:1px solid #91caff;background:#e6f4ff;color:#1677ff;cursor:pointer;font-family:ui-monospace,Menlo,monospace;user-select:none\" style-hover=\"background:#bae0ff\">+ {{ v.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <textarea value=\"{{ pf.body }}\" onchange=\"{{ onPfBody }}\" placeholder=\"在此编写 Prompt 模板…\" style=\"height:220px;padding:12px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;line-height:1.8;outline:none;resize:none;font-family:ui-monospace,Menlo,monospace\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">变量<\u002Fdiv>\n                <span style=\"font-size:11px;line-height:18px;padding:0 7px;border-radius:9px;background:#f5f5f5;color:rgba(0,0,0,.5);border:1px solid #e8e8e8\">自动识别 {{ pfVarCount }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ pfHasVars }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n                <div style=\"display:grid;grid-template-columns:190px 1fr;padding:9px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:12px;color:rgba(0,0,0,.55)\">\n                  <div>变量<\u002Fdiv><div>示例值 · 用于预览<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ pfVarRows }}\" as=\"v\" hint-placeholder-count=\"2\">\n                  <div style=\"display:grid;grid-template-columns:190px 1fr;padding:8px 14px;border-bottom:1px solid #f5f5f5;align-items:center;gap:10px\">\n                    <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:#1677ff\">{{ v.name }}<\u002Fdiv>\n                    <input value=\"{{ v.example }}\" onchange=\"{{ v.onExample }}\" placeholder=\"{{ v.ph }}\" style=\"height:30px;padding:0 10px;border:1px solid #e8e8e8;border-radius:5px;font-size:12.5px;outline:none\" style-focus=\"border-color:#1677ff\">\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ pfNoVars }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"border:1px dashed #e8e8e8;border-radius:8px;padding:14px;text-align:center;font-size:12px;color:rgba(0,0,0,.35)\">暂未检测到变量，在内容里用 {变量名} 语法插入即可自动识别<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">预览<\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(0,0,0,.4)\">已用示例值填充变量<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #f0f0f0;border-radius:8px;background:#fafafa;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.9;color:rgba(0,0,0,.8);white-space:pre-wrap;max-height:200px;overflow-y:auto\">{{ pfPreview }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">版本说明 <span style=\"color:rgba(0,0,0,.4)\">记录本次修改，便于回溯<\u002Fspan><\u002Fdiv>\n              <input value=\"{{ pf.note }}\" onchange=\"{{ onPfNote }}\" placeholder=\"如：补充引用标注要求，扩展兜底话术\" style=\"height:36px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:none;border-top:1px solid #f0f0f0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center\">\n            <div><sc-if value=\"{{ pfNoErr }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:13px;color:rgba(0,0,0,.45)\">上次更新：{{ pf.by }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ pfErr }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:13px;color:#ff4d4f\">{{ pfErr }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"display:flex;gap:12px\">\n              <div onclick=\"{{ closePromptDrawer }}\" style=\"height:36px;padding:0 18px;border:1px solid #d9d9d9;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\" style-hover=\"border-color:#1677ff;color:#1677ff\">取消<\u002Fdiv>\n              <div onclick=\"{{ savePrompt }}\" style=\"height:36px;padding:0 18px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\" style-hover=\"background:#4096ff\">{{ pfSaveLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ promptVerDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closePromptVer }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50\"><\u002Fdiv>\n        <div style=\"position:fixed;top:0;right:0;bottom:0;width:760px;background:#fff;z-index:51;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,.12)\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <div style=\"font-size:16px;font-weight:600\">版本管理<\u002Fdiv>\n              <span style=\"font-size:13px;color:rgba(0,0,0,.55)\">{{ promptVer.name }}<\u002Fspan>\n              <span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:#f5f5f5;color:rgba(0,0,0,.55);border:1px solid #e8e8e8\">{{ promptVer.node }}<\u002Fspan>\n            <\u002Fdiv>\n            <div onclick=\"{{ closePromptVer }}\" style=\"font-size:18px;color:rgba(0,0,0,.45);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px\" style-hover=\"background:#f5f5f5\">×<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1;display:flex;min-height:0\">\n            <!-- 版本时间线 -->\n            <div style=\"width:264px;flex:none;border-right:1px solid #f0f0f0;overflow-y:auto;padding:14px 14px;display:flex;flex-direction:column;gap:10px\">\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45);padding:0 2px\">版本历史 · 点击对比<\u002Fdiv>\n              <sc-for list=\"{{ promptVer.versions }}\" as=\"v\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ v.onSelect }}\" style=\"border:1px solid {{ v.selBd }};background:{{ v.selBg }};border-radius:8px;padding:10px 12px;cursor:pointer\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px\">\n                    <span style=\"font-size:13px;font-weight:600;font-family:ui-monospace,Menlo,monospace\">{{ v.ver }}<\u002Fspan>\n                    <span style=\"font-size:11px;line-height:18px;padding:0 7px;border-radius:9px;background:{{ v.stBg }};color:{{ v.stC }};border:1px solid {{ v.stBd }}\">{{ v.status }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:rgba(0,0,0,.6);line-height:1.5;margin-bottom:5px\">{{ v.note }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">{{ v.by }} · {{ v.time }}<\u002Fdiv>\n                  <sc-if value=\"{{ v.hasAction }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:10px;margin-top:8px\">\n                    <div onclick=\"{{ v.onAction }}\" style=\"font-size:12px;color:#1677ff;cursor:pointer;font-weight:500\" style-hover=\"text-decoration:underline\">{{ v.actionLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- 右侧 -->\n            <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n              <div style=\"display:flex;gap:4px;padding:16px 20px 0\">\n                <div onclick=\"{{ promptVer.onTabDiff }}\" style=\"height:32px;padding:0 14px;border-radius:6px;font-size:13px;cursor:pointer;user-select:none;background:{{ diffTabBg }};color:{{ diffTabC }}\">版本 Diff<\u002Fdiv>\n                <div onclick=\"{{ promptVer.onTabBind }}\" style=\"height:32px;padding:0 14px;border-radius:6px;font-size:13px;cursor:pointer;user-select:none;background:{{ bindTabBg }};color:{{ bindTabC }}\">绑定 Agent<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"flex:1;overflow-y:auto;padding:16px 20px;min-height:0\">\n                <!-- Diff -->\n                <sc-if value=\"{{ promptVer.tabDiff }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px\">\n                    <span style=\"color:rgba(0,0,0,.55)\">对比<\u002Fspan>\n                    <span style=\"font-family:ui-monospace,Menlo,monospace;font-weight:600\">{{ promptVer.diffFrom }}<\u002Fspan>\n                    <span style=\"color:rgba(0,0,0,.35)\">（生产）→<\u002Fspan>\n                    <span style=\"font-family:ui-monospace,Menlo,monospace;font-weight:600;color:#1677ff\">{{ promptVer.diffTo }}<\u002Fspan>\n                    <div style=\"flex:1\"><\u002Fdiv>\n                    <span style=\"font-size:12px;color:#52c41a\">+{{ promptVer.adds }}<\u002Fspan>\n                    <span style=\"font-size:12px;color:#ff4d4f\">−{{ promptVer.dels }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ promptVer.sameVer }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"padding:40px;text-align:center;color:rgba(0,0,0,.35);font-size:13px\">选中的是当前生产版本，请在左侧选择其他版本进行对比。<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"border:1px solid #f0f0f0;border-radius:8px;overflow:hidden;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.9\">\n                    <sc-for list=\"{{ promptVer.diff }}\" as=\"d\" hint-placeholder-count=\"8\">\n                      <div style=\"display:flex;background:{{ d.bg }}\">\n                        <span style=\"flex:none;width:22px;text-align:center;color:{{ d.signC }};user-select:none\">{{ d.sign }}<\u002Fspan>\n                        <span style=\"flex:1;white-space:pre-wrap;color:{{ d.color }};padding-right:12px\">{{ d.text }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ promptVer.canPublishSel }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;border-top:1px solid #f0f0f0;padding-top:16px\">\n                    <div style=\"font-size:12px;color:rgba(0,0,0,.5);line-height:1.6\">确认变更后可直接发布上线，原生产版本将自动归档，可随时回滚。<\u002Fdiv>\n                    <div onclick=\"{{ promptVer.onPublishSel }}\" style=\"flex:none;height:34px;padding:0 18px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">{{ promptVer.publishSelLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n\n                <!-- Bind -->\n                <sc-if value=\"{{ promptVer.tabBind }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:13px;color:rgba(0,0,0,.6);line-height:1.7;margin-bottom:16px\">以下 Agent 版本绑定了该 Prompt。发布新版本前请确认对这些 Agent 的影响。<\u002Fdiv>\n                  <div style=\"border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n                    <div style=\"display:grid;grid-template-columns:1fr 130px 130px;padding:10px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:12px;font-weight:600;color:rgba(0,0,0,.6)\">\n                      <div>Agent<\u002Fdiv><div>Agent 版本<\u002Fdiv><div>绑定 Prompt 版本<\u002Fdiv>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ promptVer.bind }}\" as=\"b\" hint-placeholder-count=\"2\">\n                      <div style=\"display:grid;grid-template-columns:1fr 130px 130px;padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\">\n                        <div style=\"font-weight:500\">{{ b.agent }}<\u002Fdiv>\n                        <div style=\"font-family:ui-monospace,Menlo,monospace;color:rgba(0,0,0,.65)\">{{ b.av }}<\u002Fdiv>\n                        <div><span style=\"font-size:12px;font-family:ui-monospace,Menlo,monospace;line-height:20px;padding:0 8px;border-radius:4px;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f\">{{ b.pv }}<\u002Fspan><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 评测集 -->\n      <sc-if value=\"{{ pgEvalsets }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"评测集\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n          <div style=\"font-size:16px;font-weight:600\">评测集<\u002Fdiv>\n          <div style=\"height:32px;padding:0 16px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">＋ 导入评测集<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:220px 90px 1fr 130px 150px;padding:12px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:rgba(0,0,0,.65)\">\n            <div>评测集名称<\u002Fdiv><div>用例数<\u002Fdiv><div>覆盖场景<\u002Fdiv><div>创建时间<\u002Fdiv><div>操作<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ evalsetRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:220px 90px 1fr 130px 150px;padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\" style-hover=\"background:#fafafa\">\n              <div style=\"font-weight:500\">{{ r.name }}<\u002Fdiv>\n              <div>{{ r.n }}<\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.65)\">{{ r.cover }}<\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.45)\">{{ r.time }}<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;font-size:13px\"><span style=\"color:#1677ff;cursor:pointer\">查看用例<\u002Fspan><span style=\"color:#1677ff;cursor:pointer\">发起评测<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 评测管理 -->\n      <sc-if value=\"{{ pgEvals }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"评测管理\">\n        <sc-if value=\"{{ evalListView }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n          <div style=\"font-size:16px;font-weight:600\">评测管理<\u002Fdiv>\n          <div style=\"height:32px;padding:0 16px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">＋ 发起评测<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:130px 1fr 170px 90px 90px 90px 110px 110px 70px;padding:12px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:rgba(0,0,0,.65)\">\n            <div>任务<\u002Fdiv><div>评测集<\u002Fdiv><div>Agent / 版本<\u002Fdiv><div>召回命中<\u002Fdiv><div>回答准确<\u002Fdiv><div>引用正确<\u002Fdiv><div>状态<\u002Fdiv><div>时间<\u002Fdiv><div>操作<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ evalRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:130px 1fr 170px 90px 90px 90px 110px 110px 70px;padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\" style-hover=\"background:#fafafa\">\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px\">{{ r.id }}<\u002Fdiv>\n              <div>{{ r.set }}<\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.65)\">{{ r.agent }}<\u002Fdiv>\n              <div style=\"font-weight:500\">{{ r.m1 }}<\u002Fdiv>\n              <div style=\"font-weight:500\">{{ r.m2 }}<\u002Fdiv>\n              <div style=\"font-weight:500\">{{ r.m3 }}<\u002Fdiv>\n              <div><span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:{{ r.stBg }};color:{{ r.stC }};border:1px solid {{ r.stBd }}\">{{ r.st }}<\u002Fspan><\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.45)\">{{ r.time }}<\u002Fdiv>\n              <div><span onclick=\"{{ r.onReport }}\" style=\"color:{{ r.reportColor }};cursor:{{ r.reportCursor }}\">报告<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ evalReportView }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-screen-label=\"评测报告\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n            <div onclick=\"{{ backToEvals }}\" style=\"height:30px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"border-color:#1677ff;color:#1677ff\">← 返回列表<\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:600;font-family:ui-monospace,Menlo,monospace\">{{ rep.id }}<\u002Fdiv>\n            <span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f\">已完成<\u002Fspan>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"height:30px;padding:0 14px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"border-color:#1677ff;color:#1677ff\">导出报告<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:14px 20px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px\">\n            <div><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:3px\">评测集<\u002Fdiv><div style=\"font-size:13px;font-weight:500\">{{ rep.set }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:3px\">Agent / 版本<\u002Fdiv><div style=\"font-size:13px\">{{ rep.agent }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:3px\">用例数<\u002Fdiv><div style=\"font-size:13px\">{{ rep.total }}<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:3px\">完成时间<\u002Fdiv><div style=\"font-size:13px\">{{ rep.time }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px\">\n            <sc-for list=\"{{ rep.metrics }}\" as=\"mt\" hint-placeholder-count=\"4\">\n              <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.45);margin-bottom:8px\">{{ mt.label }}<\u002Fdiv>\n                <div style=\"font-size:26px;font-weight:600;line-height:1;margin-bottom:6px;color:{{ mt.color }}\">{{ mt.value }}<\u002Fdiv>\n                <div style=\"height:6px;background:#f5f5f5;border-radius:3px;overflow:hidden\"><div style=\"height:100%;width:{{ mt.pct }};background:{{ mt.color }};border-radius:3px\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n            <div style=\"padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;font-weight:600\">用例明细<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:50px 1fr 90px 90px 90px 80px;padding:10px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:rgba(0,0,0,.65)\">\n              <div>#<\u002Fdiv><div>问题<\u002Fdiv><div>召回<\u002Fdiv><div>准确<\u002Fdiv><div>引用<\u002Fdiv><div>结果<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ rep.cases }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"display:grid;grid-template-columns:50px 1fr 90px 90px 90px 80px;padding:10px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\" style-hover=\"background:#fafafa\">\n                <div style=\"color:rgba(0,0,0,.45)\">{{ c.i }}<\u002Fdiv>\n                <div style=\"white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.q }}<\u002Fdiv>\n                <div>{{ c.recall }}<\u002Fdiv>\n                <div>{{ c.acc }}<\u002Fdiv>\n                <div>{{ c.cite }}<\u002Fdiv>\n                <div><span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:{{ c.stBg }};color:{{ c.stC }};border:1px solid {{ c.stBd }}\">{{ c.st }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Trace 追踪 -->\n      <sc-if value=\"{{ pgTraces }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Trace 追踪\">\n\n        <sc-if value=\"{{ traceListView }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\">\n            <div style=\"font-size:16px;font-weight:600\">Trace 追踪<\u002Fdiv>\n            <div style=\"font-size:13px;color:rgba(0,0,0,.45)\">共 {{ traceCount }} 条 · 点击行查看调用链路<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:12px;margin-bottom:12px\">\n            <div style=\"flex:1;background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:14px 18px\">\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:6px\">采样 Trace 数<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:700\">{{ trSummary.total }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:14px 18px\">\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:6px\">失败率<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:700;color:{{ trSummary.failC }}\">{{ trSummary.failRate }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:rgba(0,0,0,.35);margin-top:2px\">{{ trSummary.failN }} 条失败<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:14px 18px\">\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:6px\">P95 耗时<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:700;color:{{ trSummary.p95C }}\">{{ trSummary.p95 }}<\u002Fdiv>\n              <div style=\"font-size:11px;color:rgba(0,0,0,.35);margin-top:2px\">含超时熔断请求<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1.4;background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:12px 18px\">\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:8px\">快捷排查<\u002Fdiv>\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                <sc-for list=\"{{ trQuickOpts }}\" as=\"q\" hint-placeholder-count=\"4\">\n                  <div onclick=\"{{ q.onPick }}\" style=\"height:28px;padding:0 12px;line-height:26px;border-radius:14px;border:1px solid {{ q.bd }};background:{{ q.bg }};color:{{ q.color }};font-size:12px;cursor:pointer;user-select:none\">{{ q.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n            <input value=\"{{ trQuery }}\" onchange=\"{{ onTrQuery }}\" placeholder=\"搜索问题 / Trace ID\" style=\"width:220px;height:32px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none\" style-focus=\"border-color:#1677ff\">\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"font-size:13px;color:rgba(0,0,0,.45)\">Agent<\u002Fspan>\n              <div style=\"display:flex;gap:6px\">\n                <sc-for list=\"{{ trAgentOpts }}\" as=\"a\" hint-placeholder-count=\"4\">\n                  <div onclick=\"{{ a.onPick }}\" style=\"height:28px;padding:0 10px;line-height:26px;border-radius:6px;border:1px solid {{ a.bd }};background:{{ a.bg }};color:{{ a.color }};font-size:12px;cursor:pointer;user-select:none\">{{ a.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"font-size:13px;color:rgba(0,0,0,.45)\">状态<\u002Fspan>\n              <div style=\"display:flex;gap:6px\">\n                <sc-for list=\"{{ trStatusOpts }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div onclick=\"{{ s.onPick }}\" style=\"height:28px;padding:0 10px;line-height:26px;border-radius:6px;border:1px solid {{ s.bd }};background:{{ s.bg }};color:{{ s.color }};font-size:12px;cursor:pointer;user-select:none\">{{ s.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <div style=\"display:flex;border:1px solid #d9d9d9;border-radius:6px;overflow:hidden\">\n              <sc-for list=\"{{ trRangeOpts }}\" as=\"rg\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ rg.onPick }}\" style=\"height:30px;padding:0

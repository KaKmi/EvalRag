document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"dee17572-4f0f-4835-844d-eb65de896e87\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\nhtml,body{margin:0;padding:0;height:100%;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;-webkit-font-smoothing:antialiased}\n*{box-sizing:border-box}\n::-webkit-scrollbar{width:6px;height:6px}\n::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}\n::-webkit-scrollbar-track{background:transparent}\n@keyframes ccb-blink{0%,80%,100%{opacity:.25}40%{opacity:1}}\ninput,textarea{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100vh;overflow:hidden;font-size:14px;color:rgba(0,0,0,.88)\">\n\n<!-- ================= 登录 ================= -->\n<sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ true }}\">\n<div data-screen-label=\"登录\" style=\"height:100%;display:flex;align-items:center;justify-content:center;background:#f0f2f5\">\n  <div style=\"width:400px;background:#fff;border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.08);padding:40px 40px 28px\">\n    <div style=\"display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px\">\n      <div style=\"width:36px;height:36px;border-radius:8px;background:#1677ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;letter-spacing:-.5px\">CC<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:600\">CodeCrushBot<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:13px;color:rgba(0,0,0,.45);margin-bottom:28px\">课程知识库智能问答<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">邮箱<\u002Fdiv>\n        <input value=\"{{ email }}\" onchange=\"{{ onEmail }}\" placeholder=\"you@example.com\" style=\"width:100%;height:40px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">密码<\u002Fdiv>\n        <input type=\"password\" value=\"{{ pwd }}\" onchange=\"{{ onPwd }}\" onkeydown=\"{{ onLoginKey }}\" placeholder=\"至少 6 位\" style=\"width:100%;height:40px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ loginErr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13px;color:#ff4d4f;margin-top:-6px\">{{ loginErr }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div onclick=\"{{ onLogin }}\" style=\"height:40px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;user-select:none\" style-hover=\"background:#4096ff\" style-active=\"background:#0958d9\">登 录<\u002Fdiv>\n      <div onclick=\"{{ onFillDemo }}\" style=\"text-align:center;font-size:13px;color:#1677ff;cursor:pointer\" style-hover=\"text-decoration:underline\">使用演示账号 demo@codecrush.cn<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ================= C端问答 ================= -->\n<sc-if value=\"{{ showChat }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"问答页\" style=\"height:100%;display:flex;background:#f0f2f5\">\n\n  <!-- 左侧栏 -->\n  <div style=\"width:280px;flex:none;background:#fff;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;min-height:0\">\n    <div style=\"display:flex;align-items:center;gap:8px;padding:16px 16px 12px\">\n      <div style=\"width:28px;height:28px;border-radius:6px;background:#1677ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px\">CC<\u002Fdiv>\n      <div style=\"font-size:16px;font-weight:600\">CodeCrushBot<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:4px 16px 8px;font-size:12px;color:rgba(0,0,0,.45)\">知识库 Agent<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px;padding:0 12px\">\n      <sc-for list=\"{{ agents }}\" as=\"ag\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ ag.onPick }}\" style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid {{ ag.bd }};background:{{ ag.bg }};cursor:pointer\" style-hover=\"border-color:#1677ff\">\n          <div style=\"width:32px;height:32px;flex:none;border-radius:8px;background:{{ ag.color }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600\">{{ ag.initial }}<\u002Fdiv>\n          <div style=\"min-width:0;flex:1\">\n            <div style=\"font-size:14px;font-weight:{{ ag.fw }}\">{{ ag.name }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(0,0,0,.45)\">{{ ag.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:8px;height:8px;flex:none;border-radius:50%;background:{{ ag.dot }}\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"padding:14px 12px 6px\">\n      <div onclick=\"{{ onNewConv }}\" style=\"height:36px;border:1px dashed #d9d9d9;border-radius:6px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;color:rgba(0,0,0,.65);cursor:pointer;user-select:none\" style-hover=\"border-color:#1677ff;color:#1677ff\">＋ 新建会话<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:6px 16px 6px;font-size:12px;color:rgba(0,0,0,.45)\">会话<\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:0 12px;min-height:0\">\n      <sc-for list=\"{{ convs }}\" as=\"cv\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ cv.onPick }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:6px;background:{{ cv.bg }};cursor:pointer;margin-bottom:2px\" style-hover=\"background:#f5f5f5\">\n          <div style=\"min-width:0\">\n            <div style=\"font-size:13px;font-weight:{{ cv.fw }};color:{{ cv.color }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ cv.title }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(0,0,0,.35)\">{{ cv.agentName }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:none;font-size:12px;color:rgba(0,0,0,.35)\">{{ cv.time }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #f0f0f0;padding:10px 12px;display:flex;flex-direction:column;gap:2px\">\n      <div style=\"padding:7px 12px;border-radius:6px;font-size:13px;color:rgba(0,0,0,.65);cursor:pointer\" style-hover=\"background:#f5f5f5\">账号设置<\u002Fdiv>\n      <div style=\"padding:7px 12px;border-radius:6px;font-size:13px;color:rgba(0,0,0,.65);cursor:pointer\" style-hover=\"background:#f5f5f5\">帮助中心<\u002Fdiv>\n      <div onclick=\"{{ goAdmin }}\" style=\"padding:7px 12px;border-radius:6px;font-size:13px;color:#1677ff;cursor:pointer\" style-hover=\"background:#e6f4ff\">管理后台 →<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 12px 4px;margin-top:4px;border-top:1px solid #f0f0f0\">\n        <div style=\"width:30px;height:30px;border-radius:50%;background:#87d068;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px\">刘<\u002Fdiv>\n        <div style=\"flex:1;min-width:0\">\n          <div style=\"font-size:13px;font-weight:500\">刘敏<\u002Fdiv>\n          <div style=\"font-size:12px;color:rgba(0,0,0,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ userEmail }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ onLogout }}\" style=\"flex:none;font-size:12px;color:rgba(0,0,0,.45);cursor:pointer\" style-hover=\"color:#ff4d4f\">退出<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 中间聊天 -->\n  <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;background:#fff;border-right:1px solid #f0f0f0\">\n    <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;padding:0 20px\">\n      <div style=\"font-size:15px;font-weight:600\">{{ agentName }}<\u002Fdiv>\n      <sc-for list=\"{{ agentKbs }}\" as=\"kb\" hint-placeholder-count=\"2\">\n        <span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:#e6f4ff;color:#1677ff;border:1px solid #91caff\">{{ kb }}<\u002Fspan>\n      <\u002Fsc-for>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div onclick=\"{{ onToggleRight }}\" style=\"font-size:13px;color:rgba(0,0,0,.55);cursor:pointer;padding:4px 10px;border-radius:6px\" style-hover=\"background:#f5f5f5;color:#1677ff\">{{ rightToggleLabel }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px;min-height:0;background:#fafafa\">\n      <sc-for list=\"{{ msgs }}\" as=\"m\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;flex-direction:column\">\n          <sc-if value=\"{{ m.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"align-self:flex-end;max-width:70%;background:#1677ff;color:#fff;padding:10px 14px;border-radius:10px 10px 2px 10px;font-size:14px;line-height:1.7;white-space:pre-wrap\">{{ m.text }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ m.isBot }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:10px;max-width:82%\">\n              <div style=\"display:flex;gap:10px\">\n                <div style=\"width:30px;height:30px;flex:none;border-radius:8px;background:{{ agentColor }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600\">{{ agentInitial }}<\u002Fdiv>\n                <div style=\"background:#fff;border:1px solid #f0f0f0;padding:12px 16px;border-radius:2px 10px 10px 10px;font-size:14px;line-height:1.8;box-shadow:0 1px 2px rgba(0,0,0,.03)\">\n                  <sc-for list=\"{{ m.parts }}\" as=\"p\" hint-placeholder-count=\"1\">\n                    <sc-if value=\"{{ p.isText }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"white-space:pre-wrap\">{{ p.text }}<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ p.isCite }}\" hint-placeholder-val=\"{{ false }}\"><span onclick=\"{{ p.onPick }}\" style=\"display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 3px;margin:0 3px;border-radius:4px;background:{{ p.bg }};color:{{ p.fg }};font-size:11px;font-weight:600;cursor:pointer;vertical-align:2px;user-select:none\" style-hover=\"box-shadow:0 0 0 2px rgba(22,119,255,.25)\">{{ p.n }}<\u002Fspan><\u002Fsc-if>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- 可信度页脚 -->\n              <div style=\"margin-left:40px;display:flex;flex-direction:column;gap:8px\">\n\n                <!-- 兜底：未命中知识原因 -->\n                <sc-if value=\"{{ m.isFallback }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border:1px solid #ffe58f;background:#fffbe6;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:9px\">\n                    <div style=\"display:flex;align-items:center;gap:8px\">\n                      <span style=\"width:20px;height:20px;flex:none;border-radius:5px;background:#faad14;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">!<\u002Fspan>\n                      <span style=\"font-size:13px;font-weight:600;color:#874d00\">未在知识库中找到匹配内容 · 已兜底回复<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:5px\">\n                      <sc-for list=\"{{ m.fbReasons }}\" as=\"fr\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex;gap:8px;font-size:12px;line-height:1.6\">\n                          <span style=\"flex:none;color:#d48806;font-weight:600;min-width:56px\">{{ fr.k }}<\u002Fspan>\n                          <span style=\"color:rgba(0,0,0,.6)\">{{ fr.v }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 可信度 + 引用完整性 -->\n                <sc-if value=\"{{ m.showTrust }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n                    <div style=\"display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:13px;background:{{ m.confBg }};border:1px solid {{ m.confBd }}\">\n                      <span style=\"width:6px;height:6px;border-radius:50%;background:{{ m.confColor }}\"><\u002Fspan>\n                      <span style=\"font-size:12px;font-weight:600;color:{{ m.confColor }}\">可信度 {{ m.confLabel }} · {{ m.confPct }}%<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:13px;background:#fff;border:1px solid #f0f0f0\">\n                      <span style=\"font-size:12px;font-weight:700;color:{{ m.coverColor }}\">{{ m.coverIcon }}<\u002Fspan>\n                      <span style=\"font-size:12px;color:rgba(0,0,0,.7)\">{{ m.coverLabel }}<\u002Fspan>\n                      <span style=\"font-size:12px;color:rgba(0,0,0,.35)\">· {{ m.coverSub }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 低置信度提示 -->\n                <sc-if value=\"{{ m.showLow }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;gap:8px;align-items:flex-start;padding:9px 12px;border-radius:8px;background:#fff7e6;border:1px solid #ffd591\">\n                    <span style=\"flex:none;color:#d46b08;font-size:13px;line-height:1.5\">⚠<\u002Fspan>\n                    <span style=\"font-size:12px;color:#874d00;line-height:1.6\">该回答可信度较低，可能不完全准确。建议点击角标核对原文，或转人工确认后再采用。<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- 操作栏 -->\n                <div style=\"display:flex;align-items:center;gap:2px;flex-wrap:wrap\">\n                  <div onclick=\"{{ m.onCopy }}\" style=\"display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border-radius:6px;font-size:12px;color:rgba(0,0,0,.5);cursor:pointer;user-select:none\" style-hover=\"background:#f0f5ff;color:#1677ff\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>\n                    <sc-if value=\"{{ m.copied }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#52c41a\">已复制<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ m.notCopied }}\" hint-placeholder-val=\"{{ true }}\"><span>复制<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ m.onUp }}\" style=\"display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;color:{{ m.upColor }};background:{{ m.upBg }}\" style-hover=\"background:#f0f5ff\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3\"><\u002Fpath><\u002Fsvg>\n                    <span>有帮助<\u002Fspan>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ m.onDown }}\" style=\"display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 9px;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;color:{{ m.downColor }};background:{{ m.downBg }}\" style-hover=\"background:#fff1f0\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17\"><\u002Fpath><\u002Fsvg>\n                    <span>不准确<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"width:1px;height:14px;background:#e8e8e8;margin:0 6px\"><\u002Fdiv>\n                  <sc-if value=\"{{ m.handoffDone }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;font-size:12px;color:#52c41a\">\n                      <span style=\"width:6px;height:6px;border-radius:50%;background:#52c41a\"><\u002Fspan>已转接人工，客服将尽快接入\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ m.handoffPending }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div onclick=\"{{ m.onHandoff }}\" style=\"display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 12px;border-radius:6px;font-size:12px;font-weight:500;color:#1677ff;border:1px solid #91caff;background:#fff;cursor:pointer;user-select:none\" style-hover=\"background:#e6f4ff\">\n                      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n                      转人工\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ m.showFbNote }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:12px;color:rgba(0,0,0,.4)\">已记录您的反馈，我们会用于优化该 Agent 的回答质量。<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;gap:10px\">\n          <div style=\"width:30px;height:30px;flex:none;border-radius:8px;background:{{ agentColor }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600\">{{ agentInitial }}<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #f0f0f0;padding:14px 16px;border-radius:2px 10px 10px 10px;display:flex;gap:5px;align-items:center\">\n            <div style=\"width:6px;height:6px;border-radius:50%;background:#1677ff;animation:ccb-blink 1.2s infinite\"><\u002Fdiv>\n            <div style=\"width:6px;height:6px;border-radius:50%;background:#1677ff;animation:ccb-blink 1.2s .2s infinite\"><\u002Fdiv>\n            <div style=\"width:6px;height:6px;border-radius:50%;background:#1677ff;animation:ccb-blink 1.2s .4s infinite\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"flex:none;border-top:1px solid #f0f0f0;padding:14px 20px;background:#fff\">\n      <div style=\"display:flex;gap:10px;align-items:flex-end;border:1px solid #d9d9d9;border-radius:10px;padding:10px 12px\" style-focus=\"border-color:#1677ff\">\n        <textarea value=\"{{ draft }}\" onchange=\"{{ onDraft }}\" onkeydown=\"{{ onComposerKey }}\" placeholder=\"输入您的问题，Enter 发送…\" style=\"flex:1;border:none;outline:none;resize:none;font-size:14px;line-height:1.6;height:44px;padding:0\"><\u002Ftextarea>\n        <div onclick=\"{{ onSend }}\" style=\"flex:none;height:32px;padding:0 16px;border-radius:6px;background:{{ sendBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;user-select:none\">发送<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:rgba(0,0,0,.3);margin-top:6px\">回答由 AI 基于知识库生成，点击角标可查看原文出处<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 右侧引用原文 -->\n  <sc-if value=\"{{ rightOpen }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"width:340px;flex:none;background:#fff;display:flex;flex-direction:column;min-height:0\">\n    <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 16px\">\n      <div style=\"font-size:14px;font-weight:600\">引用原文<\u002Fdiv>\n      <div onclick=\"{{ onCloseRight }}\" style=\"font-size:16px;color:rgba(0,0,0,.45);cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px\" style-hover=\"background:#f5f5f5\">×<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:16px;min-height:0\">\n      <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-bottom:8px\">本会话命中知识 · {{ citeCount }} 条<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:16px\">\n        <sc-for list=\"{{ citeList }}\" as=\"ct\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{ ct.onPick }}\" style=\"display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid {{ ct.bd }};background:{{ ct.bg }};cursor:pointer\" style-hover=\"border-color:#1677ff\">\n            <span style=\"flex:none;min-width:16px;height:16px;padding:0 3px;border-radius:4px;background:{{ ct.nBg }};color:{{ ct.nFg }};font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center\">{{ ct.n }}<\u002Fspan>\n            <span style=\"font-size:12px;color:rgba(0,0,0,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ ct.sec }}<\u002Fspan>\n            <span style=\"flex:none;margin-left:auto;font-size:11px;color:rgba(0,0,0,.35)\">{{ ct.score }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasCite }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n          <div style=\"padding:12px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0\">\n            <div style=\"font-size:13px;font-weight:600;margin-bottom:6px\">《{{ cite.doc }}》<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n              <span style=\"font-size:11px;line-height:18px;padding:0 6px;border-radius:4px;background:#e6f4ff;color:#1677ff;border:1px solid #91caff\">{{ cite.kb }}<\u002Fspan>\n              <span style=\"font-size:11px;line-height:18px;padding:0 6px;border-radius:4px;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f\">相似度 {{ cite.score }}<\u002Fspan>\n              <span style=\"font-size:11px;line-height:18px;color:rgba(0,0,0,.35)\">更新于 {{ cite.updated }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:14px\">\n            <div style=\"font-size:12px;color:rgba(0,0,0,.35);line-height:1.8;margin-bottom:10px\">{{ cite.before }}<\u002Fdiv>\n            <div style=\"border-left:3px solid #1677ff;background:#e6f4ff;border-radius:0 6px 6px 0;padding:10px 12px\">\n              <div style=\"font-size:12px;font-weight:600;color:#1677ff;margin-bottom:4px\">{{ cite.sec }}<\u002Fdiv>\n              <div style=\"font-size:13px;line-height:1.9\">{{ cite.text }}<\u0 der:1px solid {{ s.bd }};border-radius:10px;padding:16px 18px\">\n              <div style=\"width:32px;height:32px;flex:none;border-radius:50%;background:{{ s.numBg }};color:{{ s.numC }};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600\">{{ s.numText }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"font-size:15px;font-weight:600\">{{ s.title }}<\u002Fspan>\n                  <span style=\"font-size:11px;line-height:18px;padding:0 8px;border-radius:9px;background:{{ s.tagBg }};color:{{ s.tagC }};border:1px solid {{ s.tagBd }}\">{{ s.tag }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:13px;color:rgba(0,0,0,.55);line-height:1.7;margin-top:4px\">{{ s.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ s.onGo }}\" style=\"flex:none;align-self:center;height:34px;padding:0 16px;border-radius:6px;background:{{ s.btnBg }};color:{{ s.btnC }};border:1px solid {{ s.btnBd }};display:flex;align-items:center;font-size:13px;cursor:pointer;user-select:none\" style-hover=\"border-color:#1677ff;color:#1677ff\">{{ s.btnLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px;font-size:12px;color:rgba(0,0,0,.4);line-height:1.7;max-width:720px\">运行看板、评测集与评测管理已在规划中，当前版本聚焦「配置 → 验证 → 上线 → 追踪」这条主链路。<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 运行看板 -->\n      <sc-if value=\"{{ pgDash }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"运行看板\">\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px\">\n          <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.45);margin-bottom:8px\">{{ st.label }}<\u002Fdiv>\n              <div style=\"font-size:26px;font-weight:600;line-height:1;margin-bottom:8px\">{{ st.value }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:rgba(0,0,0,.45)\"><span style=\"color:{{ st.dc }};font-weight:500\">{{ st.delta }}<\u002Fspan> · {{ st.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px\">\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px\">\n            <div style=\"font-size:14px;font-weight:600;margin-bottom:12px\">近 7 日问答量<\u002Fdiv>\n            <svg viewBox=\"0 0 560 170\" style=\"width:100%;display:block\">\n              <polyline points=\"20,140 106,111 193,94 280,126 366,67 453,49 540,26\" fill=\"none\" stroke=\"#1677ff\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <polygon points=\"20,140 106,111 193,94 280,126 366,67 453,49 540,26 540,160 20,160\" fill=\"rgba(22,119,255,.08)\"><\u002Fpolygon>\n              <circle cx=\"540\" cy=\"26\" r=\"4\" fill=\"#1677ff\"><\u002Fcircle>\n              <text x=\"540\" y=\"14\" text-anchor=\"end\" font-size=\"12\" fill=\"rgba(0,0,0,.65)\" font-weight=\"600\">1,284<\u002Ftext>\n              <text x=\"20\" y=\"168\" font-size=\"10\" fill=\"rgba(0,0,0,.35)\">06-26<\u002Ftext>\n              <text x=\"280\" y=\"168\" font-size=\"10\" fill=\"rgba(0,0,0,.35)\" text-anchor=\"middle\">06-29<\u002Ftext>\n              <text x=\"540\" y=\"168\" font-size=\"10\" fill=\"rgba(0,0,0,.35)\" text-anchor=\"end\">07-02<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px\">\n            <div style=\"font-size:14px;font-weight:600;margin-bottom:14px\">Agent 问答分布 · 今日<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <sc-for list=\"{{ agentDist }}\" as=\"ad\" hint-placeholder-count=\"4\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px\"><span style=\"color:rgba(0,0,0,.65)\">{{ ad.name }}<\u002Fspan><span style=\"color:rgba(0,0,0,.45)\">{{ ad.n }} 次<\u002Fspan><\u002Fdiv>\n                  <div style=\"height:8px;background:#f5f5f5;border-radius:4px;overflow:hidden\"><div style=\"height:100%;width:{{ ad.pct }}%;background:{{ ad.color }};border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px 20px\">\n          <div style=\"font-size:14px;font-weight:600;margin-bottom:12px\">热门问题 Top 5 · 近 7 日<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ hotQs }}\" as=\"hq\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:18px;height:18px;flex:none;border-radius:4px;background:{{ hq.rankBg }};color:{{ hq.rankFg }};font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center\">{{ hq.rank }}<\u002Fdiv>\n                <div style=\"width:220px;flex:none;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ hq.q }}<\u002Fdiv>\n                <div style=\"flex:1;height:8px;background:#f5f5f5;border-radius:4px;overflow:hidden\"><div style=\"height:100%;width:{{ hq.pct }}%;background:#91caff;border-radius:4px\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:60px;flex:none;text-align:right;font-size:12px;color:rgba(0,0,0,.45)\">{{ hq.n }} 次<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Agent 管理 -->\n      <sc-if value=\"{{ pgAgents }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Agent 管理\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n          <div style=\"font-size:16px;font-weight:600\">Agent 管理<\u002Fdiv>\n          <div onclick=\"{{ openAgentDrawer }}\" style=\"height:32px;padding:0 16px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">＋ 新建 Agent<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:200px 1fr 150px 90px 110px 150px;padding:12px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:rgba(0,0,0,.65)\">\n            <div>Agent<\u002Fdiv><div>绑定知识库<\u002Fdiv><div>生成模型<\u002Fdiv><div>状态<\u002Fdiv><div>更新时间<\u002Fdiv><div>操作<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ agentRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:200px 1fr 150px 90px 110px 150px;padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\" style-hover=\"background:#fafafa\">\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <div style=\"width:30px;height:30px;flex:none;border-radius:8px;background:{{ r.color }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600\">{{ r.initial }}<\u002Fdiv>\n                <div><div style=\"font-weight:500\">{{ r.name }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.45)\">{{ r.desc }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                <sc-for list=\"{{ r.kbs }}\" as=\"kb\"><span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:#f5f5f5;border:1px solid #e8e8e8;color:rgba(0,0,0,.65)\">{{ kb }}<\u002Fspan><\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.65)\">{{ r.model }}<\u002Fdiv>\n              <div><span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:{{ r.stBg }};color:{{ r.stC }};border:1px solid {{ r.stBd }}\">{{ r.st }}<\u002Fspan><\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.45)\">{{ r.updated }}<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;font-size:13px\"><span style=\"color:#1677ff;cursor:pointer\">编辑<\u002Fspan><span style=\"color:#1677ff;cursor:pointer\">评测<\u002Fspan><span style=\"color:rgba(0,0,0,.45);cursor:pointer\">日志<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ agentDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeAgentDrawer }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50\"><\u002Fdiv>\n        <div style=\"position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;z-index:51;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,.12)\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"font-size:16px;font-weight:600\">新建 Agent<\u002Fdiv>\n            <div onclick=\"{{ closeAgentDrawer }}\" style=\"font-size:18px;color:rgba(0,0,0,.45);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px\" style-hover=\"background:#f5f5f5\">×<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;padding:24px;min-height:0;display:flex;flex-direction:column;gap:20px\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.65)\"><span style=\"color:#ff4d4f\">*<\u002Fspan> Agent 名称<\u002Fdiv>\n              <input value=\"{{ dfName }}\" onchange=\"{{ onDfName }}\" placeholder=\"如：售后支持\" style=\"height:38px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">简介<\u002Fdiv>\n              <input value=\"{{ dfDesc }}\" onchange=\"{{ onDfDesc }}\" placeholder=\"一句话描述 Agent 的职责范围\" style=\"height:38px;padding:0 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;outline:none\" style-focus=\"border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.15)\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.65)\"><span style=\"color:#ff4d4f\">*<\u002Fspan> 绑定知识库<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <sc-for list=\"{{ dfKbOpts }}\" as=\"k\" hint-placeholder-count=\"5\">\n                  <div onclick=\"{{ k.onToggle }}\" style=\"font-size:13px;line-height:30px;height:30px;padding:0 12px;border-radius:6px;border:1px solid {{ k.bd }};background:{{ k.bg }};color:{{ k.color }};cursor:pointer;user-select:none\">{{ k.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:#f0f0f0;margin:2px 0\"><\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:rgba(0,0,0,.88)\">模型设置<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">生成模型<\u002Fdiv>\n                <select value=\"{{ dfGenModel }}\" onchange=\"{{ onDfGenModel }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>DeepSeek-V3<\u002Foption><option>Qwen-Max<\u002Foption><option>GPT-4o<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">改写 / 意图<\u002Fdiv>\n                <select value=\"{{ dfLightModel }}\" onchange=\"{{ onDfLightModel }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>DeepSeek-V3 (低温)<\u002Foption><option>Qwen-Max<\u002Foption><option>GPT-4o-mini<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">重排模型<\u002Fdiv>\n                <select value=\"{{ dfRerankModel }}\" onchange=\"{{ onDfRerankModel }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>bge-reranker-v2-m3<\u002Foption><option>Jina Reranker v2<\u002Foption><option>不启用重排<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:rgba(0,0,0,.4);line-height:1.6\">向量嵌入模型由绑定的知识库决定，无需在此单独配置。<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"height:1px;background:#f0f0f0;margin:2px 0\"><\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:rgba(0,0,0,.88)\">Prompt 配置<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">问题改写<\u002Fdiv>\n                <select value=\"{{ dfPromptRewrite }}\" onchange=\"{{ onDfPromptRewrite }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>问题改写-通用 v7<\u002Foption><option>问题改写-多轮 v3<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">意图识别<\u002Fdiv>\n                <select value=\"{{ dfPromptIntent }}\" onchange=\"{{ onDfPromptIntent }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>意图识别-三分类 v4<\u002Foption><option>意图识别-细粒度 v2<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">回复生成<\u002Fdiv>\n                <select value=\"{{ dfPromptReply }}\" onchange=\"{{ onDfPromptReply }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>售后回复生成 v12<\u002Foption><option>课程推荐生成 v9<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">兜底话术<\u002Fdiv>\n                <select value=\"{{ dfPromptFallback }}\" onchange=\"{{ onDfPromptFallback }}\" style=\"flex:1;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>兜底话术 v3<\u002Foption><option>兜底话术-引导留资 v1<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"height:1px;background:#f0f0f0;margin:2px 0\"><\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:rgba(0,0,0,.88)\">检索设置<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">召回 Top-K<\u002Fdiv>\n                <input value=\"{{ dfTopK }}\" onchange=\"{{ onDfTopK }}\" style=\"width:90px;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;text-align:center\" style-focus=\"border-color:#1677ff\">\n                <div style=\"width:70px;flex:none;font-size:13px;color:rgba(0,0,0,.65);margin-left:8px\">重排 Top-N<\u002Fdiv>\n                <input value=\"{{ dfTopN }}\" onchange=\"{{ onDfTopN }}\" style=\"width:90px;height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;text-align:center\" style-focus=\"border-color:#1677ff\">\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:96px;flex:none;font-size:13px;color:rgba(0,0,0,.65)\">相似度阈值<\u002Fdiv>\n                <input type=\"range\" min=\"0\" max=\"1\" step=\"0.01\" value=\"{{ dfThreshold }}\" onchange=\"{{ onDfThreshold }}\" style=\"flex:1;accent-color:#1677ff\">\n                <div style=\"width:44px;text-align:right;font-size:13px;color:rgba(0,0,0,.75);font-variant-numeric:tabular-nums\">{{ dfThreshold }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div><div style=\"font-size:13px;color:rgba(0,0,0,.65)\">多路召回（向量 + 关键词）<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.4)\">关闭则仅使用向量召回<\u002Fdiv><\u002Fdiv>\n                <div onclick=\"{{ onDfMulti }}\" style=\"width:44px;height:24px;flex:none;border-radius:12px;background:{{ dfMultiBg }};position:relative;cursor:pointer;transition:background .15s\"><div style=\"position:absolute;top:2px;left:{{ dfMultiX }};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"height:1px;background:#f0f0f0;margin:2px 0\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:4px 0\">\n              <div><div style=\"font-size:13px;color:rgba(0,0,0,.65)\">未命中知识时兜底转人工<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.4)\">召回分数低于阈值时提示联系人工客服<\u002Fdiv><\u002Fdiv>\n              <div onclick=\"{{ onDfFallback }}\" style=\"width:44px;height:24px;flex:none;border-radius:12px;background:{{ dfFallbackBg }};position:relative;cursor:pointer;transition:background .15s\"><div style=\"position:absolute;top:2px;left:{{ dfFallbackX }};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ dfErr }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:13px;color:#ff4d4f\">{{ dfErr }}<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"flex:none;border-top:1px solid #f0f0f0;padding:14px 24px;display:flex;justify-content:flex-end;gap:12px\">\n            <div onclick=\"{{ closeAgentDrawer }}\" style=\"height:36px;padding:0 18px;border:1px solid #d9d9d9;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\" style-hover=\"border-color:#1677ff;color:#1677ff\">取消<\u002Fdiv>\n            <div onclick=\"{{ saveAgent }}\" style=\"height:36px;padding:0 18px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\" style-hover=\"background:#4096ff\">创建 Agent<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 知识库管理 -->\n      <sc-if value=\"{{ pgKb }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"知识库管理\">\n        <sc-if value=\"{{ kbListView }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\">\n          <div style=\"font-size:18px;font-weight:600\">知识库<\u002Fdiv>\n          <div style=\"height:32px;padding:0 16px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">＋ 新建知识库<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(0,0,0,.5);margin-bottom:18px;line-height:1.7;max-width:760px\">每个知识库是一组文档的集合。上传的文档会被解析、切片、向量化后存入所属知识库，供绑定它的 Agent 检索。<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px\">\n          <sc-for list=\"{{ kbRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ r.onView }}\" style=\"background:#fff;border:1px solid #f0f0f0;border-radius:10px;padding:18px 20px;cursor:pointer;display:flex;flex-direction:column;gap:14px\" style-hover=\"border-color:#91caff;box-shadow:0 2px 12px rgba(22,119,255,.08)\">\n              <div style=\"display:flex;align-items:flex-start;gap:12px\">\n                <div style=\"width:40px;height:40px;flex:none;border-radius:9px;background:#e6f4ff;color:#1677ff;display:flex;align-items:center;justify-content:center\">\n                  <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M3 5v14a9 3 0 0 0 18 0V5\"><\u002Fpath><path d=\"M3 12a9 3 0 0 0 18 0\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:0\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <span style=\"font-size:15px;font-weight:600\">{{ r.name }}<\u002Fspan>\n                    <span style=\"font-size:11px;line-height:18px;padding:0 7px;border-radius:9px;background:{{ r.stBg }};color:{{ r.stC }};border:1px solid {{ r.stBd }}\">{{ r.st }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-top:3px\">{{ r.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:flex-end;gap:26px\">\n                <div><div style=\"font-size:20px;font-weight:600;line-height:1\">{{ r.docs }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-top:4px\">文档<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:20px;font-weight:600;line-height:1\">{{ r.chunks }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-top:4px\">切片<\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <div style=\"font-size:12px;color:rgba(0,0,0,.4);text-align:right;line-height:1.5\">Embedding<br>bge-m3<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid #f5f5f5;padding-top:12px;display:flex;align-items:center;justify-content:space-between\">\n                <span style=\"font-size:12px;color:rgba(0,0,0,.4)\">更新于 {{ r.updated }}<\u002Fspan>\n                <div style=\"display:flex;gap:16px;font-size:13px\">\n                  <span onclick=\"{{ r.onUpload }}\" style=\"color:#1677ff;cursor:pointer\" style-hover=\"text-decoration:underline\">上传文档<\u002Fspan>\n                  <span onclick=\"{{ r.onView }}\" style=\"color:#1677ff;cursor:pointer\" style-hover=\"text-decoration:underline\">进入 →<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fdiv>\n        <\u00 style=\"width:26px;height:26px;border:1px solid #d9d9d9;border-radius:6px;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.35)\">›<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ kbUploadDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeKbUpload }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50\"><\u002Fdiv>\n        <div style=\"position:fixed;top:0;right:0;bottom:0;width:460px;background:#fff;z-index:51;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,.12)\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"font-size:16px;font-weight:600\">上传文档 · {{ kbSel.name }}<\u002Fdiv>\n            <div onclick=\"{{ closeKbUpload }}\" style=\"font-size:18px;color:rgba(0,0,0,.45);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px\" style-hover=\"background:#f5f5f5\">×<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;padding:24px;min-height:0;display:flex;flex-direction:column;gap:20px\">\n            <div onclick=\"{{ onMockPick }}\" style=\"border:1.5px dashed #d9d9d9;border-radius:8px;padding:32px 20px;text-align:center;cursor:pointer;background:#fafafa\" style-hover=\"border-color:#1677ff;background:#f0f7ff\">\n              <div style=\"font-size:26px;color:#1677ff;margin-bottom:8px\">⬆<\u002Fdiv>\n              <div style=\"font-size:14px;color:rgba(0,0,0,.75);margin-bottom:4px\">点击选择文件或拖拽到此处<\u002Fdiv>\n              <div style=\"font-size:12px;color:rgba(0,0,0,.4)\">支持 PDF / Word / Markdown / TXT，单文件 ≤ 20MB<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ hasPicked }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ pickedFiles }}\" as=\"f\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid #f0f0f0;border-radius:6px\">\n                  <div style=\"width:28px;height:28px;flex:none;border-radius:6px;background:#e6f4ff;color:#1677ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600\">{{ f.ext }}<\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\"><div style=\"font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ f.name }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.4)\">{{ f.size }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:12px;color:#52c41a\">就绪<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">分块策略<\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <sc-for list=\"{{ chunkOpts }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ c.onPick }}\" style=\"flex:1;text-align:center;font-size:13px;line-height:36px;height:36px;border-radius:6px;border:1px solid {{ c.bd }};background:{{ c.bg }};color:{{ c.color }};cursor:pointer;user-select:none\">{{ c.name }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:none;border-top:1px solid #f0f0f0;padding:14px 24px;display:flex;justify-content:flex-end;gap:12px\">\n            <div onclick=\"{{ closeKbUpload }}\" style=\"height:36px;padding:0 18px;border:1px solid #d9d9d9;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\" style-hover=\"border-color:#1677ff;color:#1677ff\">取消<\u002Fdiv>\n            <div onclick=\"{{ confirmUpload }}\" style=\"height:36px;padding:0 18px;background:{{ uploadBg }};color:#fff;border-radius:6px;display:flex;align-items:center;font-size:14px;cursor:pointer\">开始上传并解析<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ docLifeDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeDocLife }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50\"><\u002Fdiv>\n        <div style=\"position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;z-index:51;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,.12)\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"display:flex;align-items:center;gap:10px;min-width:0\">\n              <div style=\"font-size:16px;font-weight:600;flex:none\">文档生命周期<\u002Fdiv>\n              <span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:{{ docLife.stBg }};color:{{ docLife.stC }};border:1px solid {{ docLife.stBd }};flex:none\">{{ docLife.stStatus }}<\u002Fspan>\n            <\u002Fdiv>\n            <div onclick=\"{{ closeDocLife }}\" style=\"font-size:18px;color:rgba(0,0,0,.45);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex:none\" style-hover=\"background:#f5f5f5\">×<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;overflow-y:auto;padding:20px 24px;min-height:0\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:20px\">\n              <div style=\"width:26px;height:26px;flex:none;border-radius:6px;background:#e6f4ff;color:#1677ff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600\">{{ docLife.type }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ docLife.name }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ docLife.failed }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border:1px solid #ffccc7;background:#fff2f0;border-radius:8px;padding:14px 16px;margin-bottom:22px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <span style=\"width:20px;height:20px;flex:none;border-radius:50%;background:#ff4d4f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">✕<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:600;color:#cf1322\">「解析」阶段失败<\u002Fspan>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ docLife.onRetry }}\" style=\"height:30px;padding:0 14px;background:#ff4d4f;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer;user-select:none;flex:none\" style-hover=\"background:#ff7875\">重新解析<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;color:#874d00;line-height:1.7;margin-top:8px\">{{ docLife.failReason }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:flex;flex-direction:column\">\n              <sc-for list=\"{{ docLife.stages }}\" as=\"s\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;gap:14px\">\n                  <div style=\"display:flex;flex-direction:column;align-items:center;flex:none\">\n                    <div style=\"width:28px;height:28px;flex:none;border-radius:50%;background:{{ s.bg }};border:1.5px solid {{ s.bd }};color:{{ s.c }};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">{{ s.icon }}<\u002Fdiv>\n                    <sc-if value=\"{{ s.notLast }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:2px;flex:1;min-height:30px;background:{{ s.line }}\"><\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;min-width:0;padding-bottom:20px\">\n                    <div style=\"display:flex;align-items:center;gap:10px\">\n                      <span style=\"font-size:14px;font-weight:600\">{{ s.label }}<\u002Fspan>\n                      <span style=\"font-size:11px;line-height:18px;padding:0 7px;border-radius:9px;background:{{ s.bg }};color:{{ s.c }};border:1px solid {{ s.bd }}\">{{ s.statusLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px;color:rgba(0,0,0,.45);margin-top:3px\">{{ s.desc }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:rgba(0,0,0,.35);margin-top:5px\">耗时 {{ s.dur }} · {{ s.time }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- 检索测试 -->\n      <sc-if value=\"{{ pgRetrieval }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"检索测试\">\n        <div style=\"font-size:16px;font-weight:600;margin-bottom:4px\">知识检索测试<\u002Fdiv>\n        <div style=\"font-size:13px;color:rgba(0,0,0,.45);margin-bottom:16px;line-height:1.7\">验证召回配置：确认当前设置能从知识库召回正确的文本块。此处的调整仅用于测试，不会自动保存到 Agent 配置。<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:420px 1fr;gap:16px;align-items:start\">\n\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;display:flex;flex-direction:column;overflow:hidden\">\n            <div style=\"padding:14px 18px;border-bottom:1px solid #f0f0f0;font-size:14px;font-weight:600\">测试设置<\u002Fdiv>\n            <div style=\"padding:18px;display:flex;flex-direction:column;gap:18px\">\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">检索知识库<\u002Fdiv>\n                <select value=\"{{ rtKb }}\" onchange=\"{{ onRtKb }}\" style=\"height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>课程目录库<\u002Foption><option>售后服务知识库<\u002Foption><option>学习指南库<\u002Foption><option>订单FAQ<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">向量模型（Embedding）<\u002Fdiv>\n                <select value=\"{{ rtEmbed }}\" onchange=\"{{ onRtEmbed }}\" style=\"height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>bge-m3 (1024 维)<\u002Foption><option>text-embedding-3-large<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"font-size:13px;color:rgba(0,0,0,.65)\">相似度阈值<\u002Fspan><span style=\"font-size:13px;color:rgba(0,0,0,.75);font-variant-numeric:tabular-nums\">{{ rtThreshold }}<\u002Fspan><\u002Fdiv>\n                <input type=\"range\" min=\"0\" max=\"1\" step=\"0.01\" value=\"{{ rtThreshold }}\" onchange=\"{{ onRtThreshold }}\" style=\"accent-color:#1677ff\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"font-size:13px;color:rgba(0,0,0,.65)\">向量 / 关键词权重<\u002Fspan><span style=\"font-size:13px;color:rgba(0,0,0,.75);font-variant-numeric:tabular-nums\">向量 {{ rtVec }} · 关键词 {{ rtFull }}<\u002Fspan><\u002Fdiv>\n                <input type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value=\"{{ rtVec }}\" onchange=\"{{ onRtVec }}\" style=\"accent-color:#1677ff\">\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">Rerank 模型<\u002Fdiv>\n                <select value=\"{{ rtRerank }}\" onchange=\"{{ onRtRerank }}\" style=\"height:36px;padding:0 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;outline:none;background:#fff\"><option>bge-reranker-v2-m3<\u002Foption><option>Jina Reranker v2<\u002Foption><option>不启用重排<\u002Foption><\u002Fselect>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <div><div style=\"font-size:13px;color:rgba(0,0,0,.65)\">多路召回（向量 + 关键词）<\u002Fdiv><div style=\"font-size:12px;color:rgba(0,0,0,.4)\">关闭则仅向量召回<\u002Fdiv><\u002Fdiv>\n                <div onclick=\"{{ onRtMulti }}\" style=\"width:44px;height:24px;flex:none;border-radius:12px;background:{{ rtMultiBg }};position:relative;cursor:pointer\"><div style=\"position:absolute;top:2px;left:{{ rtMultiX }};width:20px;height:20px;border-radius:50%;background:#fff;transition:left .15s\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <div style=\"font-size:13px;color:rgba(0,0,0,.65)\">测试问题<\u002Fdiv>\n                <textarea value=\"{{ rtQuery }}\" onchange=\"{{ onRtQuery }}\" placeholder=\"输入一个问题，测试能召回哪些文本块…\" style=\"height:90px;padding:10px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:13px;line-height:1.7;outline:none;resize:none\" style-focus=\"border-color:#1677ff\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div onclick=\"{{ onRtRun }}\" style=\"align-self:flex-end;height:36px;padding:0 22px;background:{{ rtRunBg }};color:#fff;border-radius:6px;display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer\">运行 ➤<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;display:flex;flex-direction:column;overflow:hidden\">\n            <div style=\"padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px\">\n              <div style=\"font-size:14px;font-weight:600\">测试结果<\u002Fdiv>\n              <sc-if value=\"{{ rtHasRun }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:13px;color:rgba(0,0,0,.45)\">共 {{ rtCount }} 条 · 阈值 {{ rtThreshold }} 以上<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"padding:16px 18px;height:560px;overflow-y:auto\">\n              <sc-if value=\"{{ rtHasRun }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;gap:14px\">\n                  <sc-for list=\"{{ rtResults }}\" as=\"r\" hint-placeholder-count=\"3\">\n                    <div style=\"border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n                      <div style=\"display:flex;align-items:center;gap:16px;padding:9px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0\">\n                        <span style=\"font-size:11px;font-weight:600;color:#1677ff;background:#e6f4ff;border-radius:4px;padding:1px 7px\">#{{ r.rank }}<\u002Fspan>\n                        <span style=\"font-size:13px;font-weight:600;color:#1677ff;font-variant-numeric:tabular-nums\">{{ r.hybrid }}<\u002Fspan>\n                        <span style=\"font-size:12px;color:rgba(0,0,0,.45)\">混合<\u002Fspan>\n                        <span style=\"font-size:12px;color:rgba(0,0,0,.45);font-variant-numeric:tabular-nums\">{{ r.kw }} 关键词<\u002Fspan>\n                        <span style=\"font-size:12px;color:rgba(0,0,0,.45);font-variant-numeric:tabular-nums\">{{ r.vec }} 向量<\u002Fspan>\n                        <div style=\"flex:1\"><\u002Fdiv>\n                        <span style=\"font-size:12px;color:rgba(0,0,0,.4)\">{{ r.source }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"padding:12px 14px;font-size:13px;line-height:1.85;color:rgba(0,0,0,.82);white-space:pre-wrap\">{{ r.text }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ rtEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(0,0,0,.3);font-size:13px;gap:8px\">\n                  <div style=\"width:44px;height:44px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(0,0,0,.2)\">⌕<\u002Fdiv>\n                  输入问题并点击「运行」查看召回结果\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Prompt 管理 -->\n      <sc-if value=\"{{ pgPrompts }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Prompt 管理\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\">\n          <div style=\"font-size:16px;font-weight:600\">Prompt 管理<\u002Fdiv>\n          <div onclick=\"{{ onNewPrompt }}\" style=\"height:32px;padding:0 16px;background:#1677ff;color:#fff;border-radius:6px;display:flex;align-items:center;font-size:13px;cursor:pointer\" style-hover=\"background:#4096ff\">＋ 新建 Prompt<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:200px 120px 80px 1fr 150px 150px;padding:12px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:rgba(0,0,0,.65)\">\n            <div>Prompt 名称<\u002Fdiv><div>所属节点<\u002Fdiv><div>当前版本<\u002Fdiv><div>变量<\u002Fdiv><div>更新人 / 时间<\u002Fdiv><div>操作<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ promptRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div style=\"display:grid;grid-template-columns:200px 120px 80px 1fr 150px 150px;padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;align-items:center\" style-hover=\"background:#fafafa\">\n              <div style=\"font-weight:500\">{{ r.name }}<\u002Fdiv>\n              <div><span style=\"font-size:12px;line-height:20px;padding:0 8px;border-radius:4px;background:{{ r.ndBg }};color:{{ r.ndC }};border:1px solid {{ r.ndBd }}\">{{ r.node }}<\u002Fspan><\u002Fdiv>\n              <div>{{ r.ver }}<\u002Fdiv>\n              <div style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:rgba(0,0,0,.55)\">{{ r.vars }}<\u002Fdiv>\n              <div style=\"color:rgba(0,0,0,.45)\">{{ r.by }}<\u002Fdiv>\n              <div style=\"display:flex;gap:12px;font-size:13px\"><span onclick=\"{{ r.onEdit }}\" style=\"color:#1677ff;cursor:pointer\">编辑<\u002Fspan><span onclick=\"{{ r.onVers }}\" style=\"color:#1677ff;cursor:pointer\">版本历史<\u002Fspan><span onclick=\"{{ r.onVers }}\" style=\"color:rgba(0,0,0,.45);cursor:pointer\" style-hover=\"color:#1677ff\">发布<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ promptDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closePromptDrawer }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50\"><\u002Fdiv>\n        <div style=\"position:fixed;top:0;right:0;bottom:0;width:720px;background:#fff;z-index:51;display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,.12)\">\n          <div style=\"height:56px;flex:none;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"display:flex;align-items:center;gap:10px\"><div style=\"font-size:16px;font-weight:600\">{{ pfTitl

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支的旧运行直接取消，省 runner 也避免过期结论覆盖新结论
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      # 版本不写死：从根 package.json 的 packageManager 字段读（当前 pnpm@9.13.2）
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # turbo 的 test/build 都 dependsOn ^build，无需额外构建步骤
      - run: pnpm test
      - run: pnpm build

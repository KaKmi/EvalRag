name: codecrush
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codecrush
      POSTGRES_PASSWORD: codecrush
      POSTGRES_DB: codecrush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codecrush -d codecrush"]
      interval: 5s
      timeout: 3s
      retries: 12
    profiles: ["infra", "full"]

  clickhouse:
    image: clickhouse/clickhouse-server:25.6
    ports:
      # 只绑本机：users.d 放开了 default 用户网络限制，若发布到 0.0.0.0 会把无密码
      # default 暴露到整个局域网（peer review Story 4 发现）。Collector 走 Docker 内网不受影响。
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./clickhouse/users.d/codecrush-default-network.xml:/etc/clickhouse-server/users.d/codecrush-default-network.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["infra", "full"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles: ["infra", "full"]

volumes:
  pgdata:
  chdata:

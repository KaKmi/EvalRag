name: codecrush
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: codecrush
      POSTGRES_PASSWORD: codecrush
      POSTGRES_DB: codecrush
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codecrush -d codecrush"]
      interval: 5s
      timeout: 3s
      retries: 12
    profiles: ["infra", "full"]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # M0 不加 healthcheck（镜像未必自带 wget）；M0.5 接线时再补。M0 只要求 postgres healthy。
    profiles: ["infra", "full"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      clickhouse:
        condition: service_started
    profiles: ["infra", "full"]

volumes:
  pgdata:
  chdata:
